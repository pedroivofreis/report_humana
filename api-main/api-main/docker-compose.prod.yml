version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: institution-service-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - institution-network-prod
    restart: always

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: institution-service-api-prod
    environment:
      # Database Configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      # Application Configuration
      PROJECT_NAME: ${PROJECT_NAME}
      API_STR: ${API_STR:-/api}
      SECRET_KEY: ${SECRET_KEY}
      API_KEY: ${API_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-11520}

      # Logging Configuration
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SQLALCHEMY_ECHO: false
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting application...' &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
      "
    networks:
      - institution-network-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  # Nginx Reverse Proxy (opcional)
  nginx:
    image: nginx:alpine
    container_name: institution-service-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - institution-network-prod
    restart: always
    profiles:
      - with-nginx

volumes:
  postgres_data_prod:
    driver: local

networks:
  institution-network-prod:
    driver: bridge

